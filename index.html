<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Tami 🌼</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    text-align:center;
    z-index:10;
    padding:20px;
}

h1{
    margin-bottom:20px;
    font-size:2rem;
}

button{
    background:#ffd166;
    color:#222;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:1.1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

#message{
    max-width:700px;
    margin-top:30px;
    font-size:1.4rem;
    line-height:1.8;
}

.flower{
    position:absolute;
    top:-100px;
    font-size:40px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(120vh) rotate(360deg);
        opacity:0;
    }
}

#signature{
    margin-top:25px;
    font-size:1.1rem;
    opacity:.9;
}

</style>
</head>

<body>

<div class="container">

    <h1>🌼 Tengo algo para ti 🌼</h1>

    <button id="openBtn">
        Abrir
    </button>

    <div id="message" class="hidden"></div>

    <div id="signature" class="hidden">
        Con cariño ❤️
    </div>

</div>

<script>

const btn = document.getElementById("openBtn");
const message = document.getElementById("message");
const signature = document.getElementById("signature");

const text = `
Hola Tami 😊

Recordé que una vez me dijiste que tus flores favoritas eran las gerberas.

Así que aunque hoy no pueda entregarte unas de verdad,
quise dejarte este pequeño detallito ❤️. 

Y para que no falten las flores...

🌼🌼🌼

Un abrazote a la distancia.
`;

btn.addEventListener("click", ()=>{

    btn.style.display = "none";

    createFlowers();

    message.classList.remove("hidden");

    let i = 0;

    function typeWriter(){

        if(i < text.length){

            message.innerHTML += text.charAt(i);
            i++;

            setTimeout(typeWriter,40);

        }else{

            signature.classList.remove("hidden");

        }

    }

    typeWriter();

});

function createFlowers(){

    setInterval(()=>{

        const flower = document.createElement("div");

        flower.classList.add("flower");

        flower.innerHTML = "🌼";

        flower.style.left = Math.random()*100 + "vw";

        flower.style.animationDuration =
            (Math.random()*4 + 5) + "s";

        document.body.appendChild(flower);

        setTimeout(()=>{
            flower.remove();
        },9000);

    },250);

}

</script>

</body>
</html>
